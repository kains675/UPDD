hydra:
  run:
    dir: /home/san/UPDD_proj/outputs/6WGN_cyclic_htc_NMA_10_20-25/rf_logs/worker_1
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.run.dir=/home/san/UPDD_proj/outputs/6WGN_cyclic_htc_NMA_10_20-25/rf_logs/worker_1
    - hydra.mode=RUN
    task:
    - inference.input_pdb=/home/san/UPDD_proj/target/6WGN.pdb
    - inference.output_prefix=/home/san/UPDD_proj/outputs/6WGN_cyclic_htc_NMA_10_20-25/designs/design_w1
    - inference.num_designs=3
    - contigmap.contigs=['A1-34/A38-169/0 20-25']
    - diffuser.T=50
    - inference.ckpt_override_path=/home/san/ai_projects/RFdiffusion/models/Complex_base_ckpt.pt
    - +inference.cyclic_peptide=True
    - ppi.hotspot_res=[A60,A61,A62,A63,A64,A65]
  job:
    name: run_inference
    chdir: null
    override_dirname: +inference.cyclic_peptide=True,contigmap.contigs=['A1-34/A38-169/0
      20-25'],diffuser.T=50,inference.ckpt_override_path=/home/san/ai_projects/RFdiffusion/models/Complex_base_ckpt.pt,inference.input_pdb=/home/san/UPDD_proj/target/6WGN.pdb,inference.num_designs=3,inference.output_prefix=/home/san/UPDD_proj/outputs/6WGN_cyclic_htc_NMA_10_20-25/designs/design_w1,ppi.hotspot_res=[A60,A61,A62,A63,A64,A65]
    id: ???
    num: ???
    config_name: base
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /home/san/UPDD_proj
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /home/san/ai_projects/RFdiffusion/config/inference
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /home/san/UPDD_proj/outputs/6WGN_cyclic_htc_NMA_10_20-25/rf_logs/worker_1
    choices:
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
